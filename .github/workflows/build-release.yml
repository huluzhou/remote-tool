name: Build and Release

# 触发：push 到 main（PR 合并后）自动 bump 版本、打 tag、构建并发布；workflow_dispatch 从 main 当前版本构建并发布（若该版本已有 Release 则会更新该 Release）。
on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write  # 需要写入权限来创建 Release、上传文件、推送 tag 和提交

jobs:
  # 仅在 push 到 main 时执行版本号更新和打 tag（跳过由 CI 自己推送的版本更新提交，避免无限循环）
  bump-and-tag:
    runs-on: ubuntu-latest
    if: "github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(版本): 自动更新版本号')"
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 获取并递增版本号
        id: bump
        run: |
          # 仅支持 X.Y.Z 数字版本
          VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION=$(node -e "const [a,b,c]=process.argv[1].split('.').map(Number); console.log(a+'.'+b+'.'+(c+1));" "$VERSION")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION -> 新版本: $NEW_VERSION"

      - name: 修改文件中的版本号
        run: |
          NEW_VERSION="${{ steps.bump.outputs.new_version }}"
          export NEW_VERSION
          node -e "
            const v = process.env.NEW_VERSION;
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            pkg.version = v;
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
            const tauri = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
            tauri.version = v;
            fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(tauri, null, 2));
          "
          # 仅支持根 [package] 下 version 单行
          sed -i "s/^version = \".*\"/version = \"$NEW_VERSION\"/" src-tauri/Cargo.toml
          echo "已更新 package.json、src-tauri/tauri.conf.json、src-tauri/Cargo.toml 版本号为 $NEW_VERSION"
          grep -E '"version"|^version' package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml

      - name: 提交版本更新
        run: |
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore(版本): 自动更新版本号至 ${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: 创建并推送 Tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

  # PR 合并到 main 后：在 bump-and-tag 成功后构建并发布；或 workflow_dispatch 时构建
  build:
    runs-on: windows-latest
    needs: bump-and-tag
    if: always() && (needs.bump-and-tag.result == 'success' || github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ needs.bump-and-tag.outputs.new_version && format('v{0}', needs.bump-and-tag.outputs.new_version) || github.ref }}

      - name: 确定 Tag 名称
        id: tag
        shell: bash
        run: |
          NEW_VERSION="${{ needs.bump-and-tag.outputs.new_version || '' }}"
          if [ -n "$NEW_VERSION" ]; then
            echo "tag=v$NEW_VERSION" >> $GITHUB_OUTPUT
          else
            echo "tag=v$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build portable app
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        shell: bash

      - name: Package portable app
        shell: powershell
        run: |
          $targetDir = "src-tauri\target\x86_64-pc-windows-msvc\release"
          $exePath = "$targetDir\remote-tool.exe"
          $tagName = "${{ steps.tag.outputs.tag }}"
          $zipName = "remote-tool-portable-$tagName.zip"
          
          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found: $exePath"
            exit 1
          }
          
          Write-Host "Found executable: remote-tool.exe"
          $exeSize = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
          Write-Host "File size: $exeSize MB"
          
          $packageDir = "portable-package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item $exePath "$packageDir\remote-tool.exe"
          
          $dllFiles = Get-ChildItem -Path $targetDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($dllFiles) {
            foreach ($dll in $dllFiles) {
              Copy-Item $dll.FullName $packageDir\
              Write-Host "Copied DLL: $($dll.Name)"
            }
          }
          
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipName -Force
          $zipSize = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
          Write-Host "Created portable package: $zipName ($zipSize MB)"
          
          Remove-Item -Path $packageDir -Recurse -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Remote Tool ${{ steps.tag.outputs.tag }}'
          generate_release_notes: true
          body: |
            ## 使用方式（便携版）
            1. 下载 `remote-tool-portable-*.zip` 压缩包
            2. 解压到任意目录
            3. 直接运行 `remote-tool.exe` 即可（无需安装）
            
            **功能:**
            - 数据查询：通过SSH连接远程服务器查询SQLite数据库
            - 应用部署：通过SSH部署应用程序到远程服务器
          files: remote-tool-portable-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
