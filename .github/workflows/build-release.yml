name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write  # 需要写入权限来创建 Release、上传文件、推送 tag 和提交

jobs:
  # 仅在 push 到 main 时执行版本号更新和打 tag（跳过由 CI 自己推送的版本更新提交，避免无限循环）
  bump-and-tag:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && !contains(github.event.head_commit.message, 'chore(版本): 自动更新版本号')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 配置 Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: 获取并递增版本号
        id: bump
        run: |
          VERSION=$(node -p "require('./package.json').version")
          NEW_VERSION=$(node -e "const [a,b,c]=process.argv[1].split('.').map(Number); console.log(a+'.'+b+'.'+(c+1));" "$VERSION")
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT
          echo "当前版本: $VERSION -> 新版本: $NEW_VERSION"
          bash update-version.sh "$NEW_VERSION"

      - name: 提交版本更新
        run: |
          git add package.json src-tauri/Cargo.toml src-tauri/tauri.conf.json
          git diff --staged --quiet || git commit -m "chore(版本): 自动更新版本号至 ${{ steps.bump.outputs.new_version }}"
          git push origin main

      - name: 创建并推送 Tag
        run: |
          git tag -a "v${{ steps.bump.outputs.new_version }}" -m "Release v${{ steps.bump.outputs.new_version }}"
          git push origin "v${{ steps.bump.outputs.new_version }}"

  # 仅在 tag 推送时构建并发布（避免 push 到 main 时重复构建）
  build:
    runs-on: windows-latest
    if: github.ref_type == 'tag' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 确定 Tag 名称
        id: tag
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "tag=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            TAG="v$(node -p "require('./package.json').version")"
            echo "tag=$TAG" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install frontend dependencies
        run: npm install

      - name: Build portable app
        run: npm run tauri build -- --target x86_64-pc-windows-msvc
        shell: bash

      - name: Package portable app
        shell: powershell
        run: |
          $targetDir = "src-tauri\target\x86_64-pc-windows-msvc\release"
          $exePath = "$targetDir\remote-tool.exe"
          $tagName = "${{ steps.tag.outputs.tag }}"
          $zipName = "remote-tool-portable-$tagName.zip"
          
          if (-not (Test-Path $exePath)) {
            Write-Error "Executable not found: $exePath"
            exit 1
          }
          
          Write-Host "Found executable: remote-tool.exe"
          $exeSize = [math]::Round((Get-Item $exePath).Length / 1MB, 2)
          Write-Host "File size: $exeSize MB"
          
          $packageDir = "portable-package"
          New-Item -ItemType Directory -Force -Path $packageDir | Out-Null
          Copy-Item $exePath "$packageDir\remote-tool.exe"
          
          $dllFiles = Get-ChildItem -Path $targetDir -Filter "*.dll" -ErrorAction SilentlyContinue
          if ($dllFiles) {
            foreach ($dll in $dllFiles) {
              Copy-Item $dll.FullName $packageDir\
              Write-Host "Copied DLL: $($dll.Name)"
            }
          }
          
          Compress-Archive -Path "$packageDir\*" -DestinationPath $zipName -Force
          $zipSize = [math]::Round((Get-Item $zipName).Length / 1MB, 2)
          Write-Host "Created portable package: $zipName ($zipSize MB)"
          
          Remove-Item -Path $packageDir -Recurse -Force

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: 'Remote Tool ${{ steps.tag.outputs.tag }}'
          generate_release_notes: true
          body: |
            ## 使用方式（便携版）
            1. 下载 `remote-tool-portable-*.zip` 压缩包
            2. 解压到任意目录
            3. 直接运行 `remote-tool.exe` 即可（无需安装）
            
            **功能:**
            - 数据查询：通过SSH连接远程服务器查询SQLite数据库
            - 应用部署：通过SSH部署应用程序到远程服务器
          files: remote-tool-portable-*.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
