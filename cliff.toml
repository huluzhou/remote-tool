# git-cliff 配置：基于 Conventional Commits 生成 Changelog
# https://git-cliff.org/docs/configuration

[changelog]
header = ""
body = """
{% if version %}## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim }}

{% for commit in commits %}
- {% if commit.scope %}({{ commit.scope }}) {% endif %}{{ commit.message }}{% if commit.id %} (`{{ commit.id | truncate(length=7, end="") }}`){% endif %}
{% endfor %}

{% endfor %}
{% endif %}
"""
trim = true

[git]
conventional_commits = true
filter_unconventional = true
tag_pattern = "v[0-9].*"
sort_commits = "newest"

commit_parsers = [
  { message = "^feat", group = "✨ 新功能" },
  { message = "^fix", group = "🐛 修复" },
  { message = "^perf", group = "⚡ 性能" },
  { message = "^refactor", group = "♻️ 重构" },
  { message = "^docs", group = "📚 文档" },
  { message = "^style", group = "💄 样式" },
  { message = "^test", group = "🧪 测试" },
  { message = "^chore\\(版本\\)", skip = true },
  { message = "^chore", group = "🔧 其他" },
  { message = "^ci", group = "🔧 其他" },
]
